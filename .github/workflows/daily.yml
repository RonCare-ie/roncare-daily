name: Daily Briefing

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate today's briefing
        run: node generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "RonCare Daily Bot"
          git config user.email "bot@roncare.ie"
          git add index.html posts/
          git diff --staged --quiet || git commit -m "Daily briefing $(date +%Y-%m-%d)"
          git push

      - name: Trigger Netlify deploy
        run: curl -s -X POST ${{ secrets.NETLIFY_DEPLOY_HOOK }}
